name: CI/CD → HuggingFace Space

on:
  push:
    branches: [main]
  schedule:
    # MLOps monitoring — daily at midnight UTC
    - cron: '0 0 * * *'

# ── Job 1: CI/CD ─────────────────────────────────────────────────────────────
jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          grep -vE '^(torch)==' requirements.txt > /tmp/req.txt
          pip install pytest httpx -r /tmp/req.txt

      - name: Run tests
        run: |
          if [ -d "tests" ] && ls tests/*.py &>/dev/null; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — skipping"
          fi

      - name: Deploy to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"].strip()
          api = HfApi()
          user = api.whoami(token=token)
          print(f"Authenticated as: {user['name']}")

          api.upload_folder(
              folder_path=".",
              repo_id="irajkoohi/Rag_mlop",
              repo_type="space",
              token=token,
              ignore_patterns=[
                  ".git", ".git/*",
                  ".venv", ".venv/*",
                  "__pycache__", "**/__pycache__",
                  "chroma_db", "chroma_db/*",
                  "data/*.pdf",
                  "logs", "logs/*",
                  "*.pyc",
              ],
              delete_patterns=["*.pyc", "__pycache__/*", "**/__pycache__/*"],
          )
          print("Deployed to HuggingFace Space")
          EOF

      - name: Notify success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          os.environ.setdefault("SLACK_WEBHOOK_URL", os.getenv("SLACK_WEBHOOK_URL", ""))
          from monitor.alerts import alert_deploy_success
          alert_deploy_success(os.getenv("COMMIT_SHA", ""))
          EOF

      - name: Notify failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          os.environ.setdefault("SLACK_WEBHOOK_URL", os.getenv("SLACK_WEBHOOK_URL", ""))
          from monitor.alerts import send_alert
          send_alert("Deploy pipeline FAILED. Check GitHub Actions.", level="critical")
          EOF

# ── Job 2: Wake HF Spaces ─────────────────────────────────────────────────────
  wake-spaces:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Wake / restart sleeping spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          token = os.environ["HF_TOKEN"].strip()
          api = HfApi()
          spaces = [
              "irajkoohi/Rag_mlop",
              "irajkoohi/Agentic_Rag1_dep_space",
          ]
          for space in spaces:
              try:
                  info = api.get_space_runtime(space, token=token)
                  stage = info.stage
                  print(f"{space}: {stage}")
                  if stage in ("SLEEPING", "PAUSED", "STOPPED", "ERROR", "RUNTIME_ERROR"):
                      api.restart_space(space, token=token)
                      print(f"  → restarted")
              except Exception as e:
                  print(f"  → failed: {e}")
          EOF

# ── Job 3: MLOps Monitoring ───────────────────────────────────────────────────
  monitor:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install monitoring dependencies
        run: pip install requests scipy

      - name: Drift detection
        env:
          SPACE_URL: https://irajkoohi-rag-mlop.hf.space
          IDK_THRESHOLD: "0.5"
          LATENCY_THRESHOLD: "5000"
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m monitor.drift_check

      - name: Accuracy / canary check
        env:
          SPACE_URL: https://irajkoohi-rag-mlop.hf.space
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m monitor.accuracy_check
