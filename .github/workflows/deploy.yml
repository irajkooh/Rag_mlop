name: CI/CD → HuggingFace Space

on:
  push:
    branches: [main]
  schedule:
    # MLOps monitoring runs every day at midnight UTC
    - cron: '0 0 * * *'

jobs:

  # ── Job 1: Test & Deploy ─────────────────────────────────────────────────
  # Runs on every push to main.
  # Steps: install → test → push to HF.
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0        # full history needed for git push to HF

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          grep -v '^torch==' requirements.txt | grep -v '^torchvision==' > /tmp/req.txt
          pip install -r /tmp/req.txt

      - name: Run unit tests
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
            pip install pytest httpx
            pytest tests/ -v --tb=short
          else
            echo "ℹ️  No tests found — skipping"
          fi

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "irajkooh@users.noreply.github.com"
          git config user.name  "irajkooh"
          git remote add hf \
            https://irajkoohi:$HF_TOKEN@huggingface.co/spaces/irajkoohi/Rag_mlop
          git push hf main --force

      - name: Notify deploy success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, '.')
          os.environ.setdefault("SLACK_WEBHOOK_URL", os.getenv("SLACK_WEBHOOK_URL",""))
          from monitor.alerts import alert_deploy_success
          alert_deploy_success(os.getenv("COMMIT_SHA",""))
          PYEOF

      - name: Notify deploy failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, '.')
          os.environ.setdefault("SLACK_WEBHOOK_URL", os.getenv("SLACK_WEBHOOK_URL",""))
          from monitor.alerts import send_alert
          send_alert("Deploy pipeline FAILED. Check GitHub Actions for details.", level="critical")
          PYEOF

  # ── Job 2: MLOps Monitoring ──────────────────────────────────────────────
  # Runs on the daily cron schedule (independent of deploys).
  # Steps: drift check → accuracy check.
  monitor:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install monitoring dependencies
        run: pip install requests scipy

      - name: Run drift detection
        env:
          SPACE_URL:         https://irajkoohi-rag-mlop.hf.space
          IDK_THRESHOLD:     "0.5"
          LATENCY_THRESHOLD: "5000"
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m monitor.drift_check

      - name: Run accuracy / canary check
        env:
          SPACE_URL:         https://irajkoohi-rag-mlop.hf.space
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m monitor.accuracy_check
